<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | CHRIS' KIKHOLO TRADING HUB</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.register-box{

width:450px;

background:white;

padding:35px;

border-radius:15px;

box-shadow:0 10px 25px rgba(0,0,0,.2);

}

.register-box h2{

text-align:center;

margin-bottom:25px;

color:#003366;

}

.input-group{

margin-bottom:18px;

}

.input-group label{

display:block;

margin-bottom:6px;

font-weight:bold;

}

.input-group input{

width:100%;

padding:12px;

border:1px solid #ccc;

border-radius:8px;

font-size:16px;

}

button{

width:100%;

padding:14px;

background:#0077ff;

color:white;

border:none;

border-radius:8px;

font-size:18px;

cursor:pointer;

}

button:hover{

background:#005fd1;

}

.message{

margin-top:20px;

display:none;

padding:12px;

text-align:center;

border-radius:8px;

font-weight:bold;

}

.success{

background:#d4edda;

color:#155724;

}

.error{

background:#f8d7da;

color:#721c24;

}

.login{

margin-top:20px;

text-align:center;

}

.login a{

text-decoration:none;

color:#0077ff;

font-weight:bold;

}

</style>

</head>

<body>

<div class="register-box">

<h2>Create Account</h2>

<form id="registerForm">

<div class="input-group">

<label>Full Name</label>

<input type="text" id="name" required>

</div>

<div class="input-group">

<label>Email Address</label>

<input type="email" id="email" required>

</div>

<div class="input-group">

<label>Password</label>

<input type="password" id="password" required>

</div>

<div class="input-group">

<label>Confirm Password</label>

<input type="password" id="confirm" required>

</div>

<button type="submit">

Create Account

</button>

</form>

<div id="message" class="message"></div>

<div class="login">

Already have an account?

<a href="login.html">

Login

</a>

</div>

</div>

<script>

document.getElementById("registerForm").addEventListener("submit",function(e){

e.preventDefault();

let name=document.getElementById("name").value;

let email=document.getElementById("email").value;

let password=document.getElementById("password").value;

let confirm=document.getElementById("confirm").value;

let message=document.getElementById("message");

if(password!==confirm){

message.style.display="block";

message.className="message error";

message.innerHTML="Passwords do not match.";

return;

}

let users=JSON.parse(localStorage.getItem("users"))||[];

let exists=users.find(user=>user.email===email);

if(exists){

message.style.display="block";

message.className="message error";

message.innerHTML="Email already registered.";

return;

}

users.push({

name:name,

email:email,

password:password

});

localStorage.setItem("users",JSON.stringify(users));

message.style.display="block";

message.className="message success";

message.innerHTML="Account created successfully. Redirecting to login...";

setTimeout(function(){

window.location="login.html";

},2000);

});

</script>

</body>

</html>
